<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Portal</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <h1>Community Event Portal</h1>

    <h2>Event Filter</h2>

    <select id="categoryFilter">
        <option value="all">All</option>
        <option value="Music">Music</option>
        <option value="Workshop">Workshop</option>
    </select>

    <input type="text"
           id="searchBox"
           placeholder="Search Events">

    <button id="loadBtn">
        Load Events
    </button>

    <div id="spinner"></div>

    <div id="eventContainer"></div>

    <hr>

    <h2>Register</h2>

    <form id="registrationForm">

        <input type="text"
               name="name"
               placeholder="Name">

        <input type="email"
               name="email"
               placeholder="Email">

        <select name="event">

            <option value="">
                Select Event
            </option>

            <option value="Music Night">
                Music Night
            </option>

            <option value="Baking Workshop">
                Baking Workshop
            </option>

        </select>

        <button type="submit"
                id="registerBtn">

            Register

        </button>

    </form>

    <p id="message"></p>

    <script src="js/main.js"></script>

</body>
</html>
